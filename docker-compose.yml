version: '3.8'

services:
  redis:
    image: redis:7.2-alpine
    container_name: person_tracker_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tracker_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Person Detector Python App
  person-detector:
    build:
      context: ./person-detector
      dockerfile: Dockerfile
    container_name: person-detector-app
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - API_SECRET_KEY=${API_SECRET_KEY}
    ports:
      - "5000:5000"
      - "5001:5001"
    volumes:
      - ./recordings:/app/recordings
      # - ./models:/app/models
      - ./person-detector:/app_pd
    devices:
      - /dev/video0:/dev/video0
    privileged: true
    networks:
      - tracker_network    

  # CNN Model Recognition App
  cnn-recognizer:
    build:
      context: ./cnn/backend
      dockerfile: Dockerfile
    container_name: cnn-recognition-app
    ports:
      - "5002:5002"  # Different port to avoid conflict
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MODEL_PATH=/app/models/cnn_model.h5
    volumes:
      - ./cnn/backend:/app_cnn
      # - ./models:/app/models
    depends_on:
      - redis
      - person-detector
    restart: unless-stopped
    privileged: true
    networks:
      - tracker_network

  frontend:
    build: ./web
    image: meter-watch-frontend:latest
    container_name: angular-frontend
    ports:
      - "8080:80"
    depends_on:
      - cnn-recognizer
    networks:
      - tracker_network
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis_commander
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOSTS=local:redis:6379
      - PORT=8081
    ports:
      - "8081:8081"
    networks:
      - tracker_network

volumes:
  redis_data:
  yolov8_models:

networks:
  tracker_network:
    driver: bridge