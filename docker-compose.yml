version: '3.8'

services:
  redis:
    image: redis:7.2-alpine
    container_name: person_tracker_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tracker_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # app:
  #   build: .
  #   container_name: person_tracker_app
  #   restart: unless-stopped
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #   environment:
  #     - REDIS_HOST=redis
  #     - REDIS_PORT=6379
  #     - DISPLAY=${DISPLAY:-:0}
  #   volumes:
  #     - ./app:/app
  #     - ./recordings:/app/recordings
  #     - yolov8_models:/root/.cache/Ultralytics
  #     - /dev/video0:/dev/video0
  #     - /tmp/.X11-unix:/tmp/.X11-unix:rw
  #   devices:
  #     - /dev/dri:/dev/dri
  #   privileged: true
  #   networks:
  #     - tracker_network
  #   stdin_open: true
  #   tty: true

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis_commander
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOSTS=local:redis:6379
      - PORT=8081
    ports:
      - "8081:8081"
    networks:
      - tracker_network

volumes:
  redis_data:
  yolov8_models:

networks:
  tracker_network:
    driver: bridge