version: '3.8'

services:
  redis:
    image: redis:7.2-alpine
    container_name: person_tracker_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tracker_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Person Detector Python App
  person-detector:
    build:
      context: .
      dockerfile: person-detector/Dockerfile
    container_name: person-detector-app
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    # environment:
    #   - REDIS_HOST=redis
    #   - REDIS_PORT=6379
    #   - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    #   - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    #   - API_SECRET_KEY=${API_SECRET_KEY}
    #   - PYTHONPATH=/app
    ports:
      - "5000:5000"
      - "5001:5001"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro    
      - ./meter-watch-shared:/app/meter_watch_shared
      - ./person-detector:/app/local
      - ./recordings:/app/recordings      
    devices:
      - /dev/video0:/dev/video0
    privileged: true
    networks:
      - tracker_network

  # CNN Model Recognition App
  cnn-recognizer:
    build:
      context: .
      dockerfile: cnn/backend/Dockerfile
    container_name: cnn-recognition-app
    restart: unless-stopped
    ports:
      - "5002:5002"
    env_file:
      - .env
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro    
      - ./meter-watch-shared:/app/meter_watch_shared
      - ./cnn/backend:/app/local
      - ./output:/app/local/output
      - ./output:/app/output
    depends_on:
      redis:
        condition: service_healthy
    privileged: true
    networks:
      - tracker_network

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: meter-watch-frontend:latest
    container_name: angular-frontend
    ports:
      - "8080:80"
    depends_on:
      - cnn-recognizer
    networks:
      - tracker_network
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis_commander
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOSTS=local:redis:6379
      - PORT=8081
    ports:
      - "8081:8081"
    networks:
      - tracker_network

volumes:
  redis_data:
  yolov8_models:

networks:
  tracker_network:
    driver: bridge