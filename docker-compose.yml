version: '3.8'

services:
  redis:
    image: redis:7.2-alpine
    container_name: person_tracker_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tracker_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Person Detector Python App
  person-detector:
    build:
      context: .
      dockerfile: services/person-detector/Dockerfile
    container_name: person-detector-app
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "5000:5000"
      - "5001:5001"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro    
      # For local development only - uncomment if needed
      # - ./meter-watch-shared:/app/meter_watch_shared
      - ./services/person-detector:/app/local
      - ./output/recordings:/app/recordings      
    devices:
      - /dev/video0:/dev/video0
    privileged: true
    networks:
      - tracker_network

  # CNN Model Recognition App
  cnn-recognizer:
    build:
      context: .
      dockerfile: ./services/cnn-recognizer/Dockerfile
    container_name: cnn-recognition-app
    restart: unless-stopped
    ports:
      - "5002:5002"
    env_file:
      - .env
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro  
      # For local development only - uncomment if needed
      # - ./meter-watch-shared:/app/meter_watch_shared
      - ./services/cnn-recognizer:/app/local
      - ./output:/app/local/output
      - ./output:/app/output
    depends_on:
      redis:
        condition: service_healthy
    privileged: true
    networks:
      - tracker_network

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: meter-watch-frontend:latest
    container_name: angular-frontend
    ports:
      - "8080:80"
    depends_on:
      - cnn-recognizer
    networks:
      - tracker_network
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis_commander
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOSTS=local:redis:6379
      - PORT=8081
    ports:
      - "8081:8081"
    networks:
      - tracker_network

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: person_tracker_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tracker_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-person_tracker}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - tracker_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tracker_user} -d ${POSTGRES_DB:-person_tracker}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: person_tracker_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin_password}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./config/pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - tracker_network
    depends_on:
      postgres:
        condition: service_healthy      

  grafana:
    image: grafana/grafana:latest
    container_name: person_tracker_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=http://localhost:3000
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      # Uncomment for provisioning
      # - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      # - ./config/grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - tracker_network
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  redis_data:
  yolov8_models:
  postgres_data:  
  pgadmin_data:
  grafana_data:  

networks:
  tracker_network:
    driver: bridge