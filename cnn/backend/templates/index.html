<!DOCTYPE html>
<html>

<head>
    <title>Digit Recognition Test</title>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
            background: #f5f5f5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .file-list {
            margin: 20px 0;
        }

        .file {
            margin: 5px;
            padding: 10px;
            background: #e0e0e0;
            cursor: pointer;
            display: inline-block;
            border-radius: 5px;
        }

        .file:hover {
            background: #d0d0d0;
        }

        #result {
            margin-top: 20px;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        .digit-card {
            display: inline-block;
            margin: 10px;
            text-align: center;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .digit-img {
            width: 80px;
            height: 80px;
            border: 1px solid #ddd;
        }

        .heatmap-img {
            width: 80px;
            margin-top: 5px;
        }

        .prediction {
            font-size: 24px;
            font-weight: bold;
            color: #4CAF50;
            margin: 10px 0;
        }

        .confidence {
            color: #666;
            font-size: 12px;
        }

        h3 {
            color: #333;
        }

        .loading {
            color: #999;
            font-style: italic;
        }

        .digit-selector {
            margin: 15px 0;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
            border-left: 4px solid #4CAF50;
        }

        .digit-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 10px 0;
        }

        .digit-btn {
            width: 50px;
            height: 50px;
            border: 2px solid #ddd;
            background: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .digit-btn:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }

        .digit-btn.selected {
            background: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }

        .submit-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: #45a049;
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            border: 1px solid #c3e6cb;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            border: 1px solid #f5c6cb;
        }

        .digit-position {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }

        .dataset-selector {
            margin-bottom: 20px;
        }

        .dataset-btn {
            margin: 5px;
            padding: 8px 15px;
            background: #e0e0e0;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .dataset-btn.active {
            background: #4CAF50;
            color: white;
        }

        .file-item {
            display: inline-flex;
            align-items: center;
            margin: 5px;
            gap: 5px;
        }

        .file {
            margin: 0;
            padding: 10px;
            background: #e0e0e0;
            cursor: pointer;
            display: inline-block;
            border-radius: 5px;
        }

        .file:hover {
            background: #d0d0d0;
        }

        .delete-btn {
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .delete-btn:hover {
            background: #cc0000;
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📷 Digit Recognition API Test</h1>

        <div class="dataset-selector">
            <h3>Select Dataset:</h3>
            <button class="dataset-btn active" onclick="selectDataset('test')">Test Dataset</button>
            <button class="dataset-btn" onclick="selectDataset('train')">Train Dataset</button>
            <button class="dataset-btn" onclick="selectDataset('validation')">Validation Dataset</button>
        </div>

        <div class="file-list">
            <h3>Available Images:</h3>
            <div id="files" class="loading">Loading...</div>
        </div>

        <div id="result"></div>
    </div>

    <script>
        let currentDataset = 'test';
        let currentFilename = null;
        let currentDigits = [];
        let selectedDigits = {};

        // Select dataset
        function selectDataset(dataset) {
            currentDataset = dataset;
            document.querySelectorAll('.dataset-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Reload files for new dataset
            loadFiles();

            // Clear results
            document.getElementById('result').innerHTML = '';
            currentFilename = null;
            selectedDigits = {};
        }

        // Load files from selected dataset
        function loadFiles() {
            const filesDiv = document.getElementById('files');
            filesDiv.innerHTML = '<div class="loading">Loading...</div>';

            fetch(`/test/list?dataset=${currentDataset}`)
                .then(res => res.json())
                .then(data => {
                    if (data.files && data.files.length) {
                        filesDiv.innerHTML = data.files.map(f => `
                    <div class="file-item" style="display: inline-flex; align-items: center; margin: 5px; gap: 5px;">
                        <div class="file" onclick="recognize('${f.replace(/'/g, "\\'")}')">
                            📷 ${f}
                        </div>
                        <button class="delete-btn" onclick="deleteFile('${f.replace(/'/g, "\\'")}')" 
                                style="background: #ff4444; color: white; border: none; border-radius: 5px; 
                                       padding: 5px 10px; cursor: pointer; font-size: 12px;">
                            🗑️
                        </button>
                    </div>
                `).join('');
                    } else {
                        filesDiv.innerHTML = '❌ No images found in this dataset';
                    }
                })
                .catch(err => {
                    filesDiv.innerHTML = '❌ Error loading files';
                    console.error('Error:', err);
                });
        }

        // Delete file function
        function deleteFile(filename) {
            fetch('/delete-file', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    filename: filename,
                    dataset: currentDataset
                })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        // Show success message
                        const successDiv = document.createElement('div');
                        successDiv.className = 'success-message';
                        successDiv.style.position = 'fixed';
                        successDiv.style.top = '20px';
                        successDiv.style.right = '20px';
                        successDiv.style.zIndex = '1000';
                        successDiv.innerHTML = `✅ File deleted: ${filename}`;
                        document.body.appendChild(successDiv);

                        // Remove success message after 3 seconds
                        setTimeout(() => {
                            successDiv.remove();
                        }, 3000);

                        // Reload file list
                        loadFiles();

                        // Clear results if the deleted file was currently selected
                        if (currentFilename === filename) {
                            document.getElementById('result').innerHTML = '';
                            currentFilename = null;
                            selectedDigits = {};
                        }
                    } else {
                        throw new Error(data.error || 'Unknown error');
                    }
                })
                .catch(err => {
                    console.error('Error deleting file:', err);
                    const errorDiv = document.createElement('div');
                    errorDiv.className = 'error-message';
                    errorDiv.style.position = 'fixed';
                    errorDiv.style.top = '20px';
                    errorDiv.style.right = '20px';
                    errorDiv.style.zIndex = '1000';
                    errorDiv.innerHTML = `❌ Error deleting file: ${err.message}`;
                    document.body.appendChild(errorDiv);

                    setTimeout(() => {
                        errorDiv.remove();
                    }, 3000);
                });
        }

        // Function to recognize digits
        function recognize(filename) {
            currentFilename = filename;
            selectedDigits = {};
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="loading">⏳ Processing...</div>';

            fetch(`/test?filename=${encodeURIComponent(filename)}&dataset=${currentDataset}`)
                .then(res => res.json())
                .then(data => {
                    if (data.error) {
                        resultDiv.innerHTML = `<div style="color: red;">❌ Error: ${data.error}</div>`;
                        return;
                    }

                    currentDigits = data.digits;

                    let html = `<h3>📁 ${data.filename}</h3>`;
                    html += `<h2>🔢 Full Number: <strong style="color: #4CAF50;">${data.full_number}</strong></h2>`;

                    // Add digit selector for each digit position
                    html += `<div class="digit-selector">`;
                    html += `<h4>✏️ Select Correct Digits:</h4>`;
                    html += `<p>Click on the buttons below to select the correct digit for each position:</p>`;
                    html += `<div>`;

                    data.digits.forEach((d, index) => {
                        html += `
                            <div class="digit-card" style="display: inline-block; margin: 10px;">
                                <img class="digit-img" src="data:image/png;base64,${d.digit_image}" alt="digit" id="digit-img-${index}">
                                <div class="prediction">Predicted: ${d.prediction}</div>
                                <div class="confidence">${(d.confidence * 100).toFixed(1)}%</div>
                                <div class="digit-position">Position ${index + 1}</div>
                                <div class="digit-buttons" id="digit-buttons-${index}">
                                    ${generateDigitButtons(index, d.prediction)}
                                </div>
                                <img class="heatmap-img" src="data:image/png;base64,${d.heatmap_gradcam}" alt="gradcam">
                                <div style="font-size: 10px;">Grad-CAM</div>
                                <img class="heatmap-img" src="data:image/png;base64,${d.heatmap_saliency}" alt="saliency">
                                <div style="font-size: 10px;">Saliency</div>
                            </div>
                        `;
                    });

                    html += `</div>`;
                    html += `<button class="submit-btn" onclick="submitCorrections()">📤 Save Selected Digits</button>`;
                    html += `</div>`;

                    resultDiv.innerHTML = html;

                    // Store digit images base64 for saving
                    data.digits.forEach((d, index) => {
                        window[`digitImageBase64_${index}`] = d.digit_image;
                    });

                    // Add event listeners to digit buttons
                    data.digits.forEach((d, index) => {
                        for (let i = 0; i <= 9; i++) {
                            const btn = document.getElementById(`btn-${index}-${i}`);
                            if (btn) {
                                btn.onclick = (e) => {
                                    e.stopPropagation();
                                    selectDigit(index, i);
                                };
                            }
                        }
                    });
                })
                .catch(err => {
                    resultDiv.innerHTML = `<div style="color: red;">❌ Error: ${err.message}</div>`;
                });
        }

        // Generate digit buttons for a specific position
        function generateDigitButtons(positionIndex, predictedDigit) {
            let buttons = '';
            for (let i = 0; i <= 9; i++) {
                const isSelected = selectedDigits[positionIndex] === i;
                const isPredicted = parseInt(predictedDigit) === i;
                const style = isSelected ? 'selected' : '';
                buttons += `<button class="digit-btn ${style}" id="btn-${positionIndex}-${i}" style="${isPredicted && !isSelected ? 'border-color: #ff9800;' : ''}">${i}</button>`;
            }
            return buttons;
        }

        // Select digit for a specific position
        function selectDigit(positionIndex, digit) {
            if (selectedDigits[positionIndex] === digit) {
                delete selectedDigits[positionIndex];
            } else {
                selectedDigits[positionIndex] = digit;
            }

            // Update button styles
            for (let i = 0; i <= 9; i++) {
                const btn = document.getElementById(`btn-${positionIndex}-${i}`);
                if (btn) {
                    if (selectedDigits[positionIndex] === i) {
                        btn.classList.add('selected');
                    } else {
                        btn.classList.remove('selected');
                    }
                }
            }
        }

        // Submit corrections to server
        async function submitCorrections() {
            if (!currentFilename || Object.keys(selectedDigits).length === 0) {
                alert('Please select at least one digit correction before submitting');
                return;
            }

            // Disable submit button
            const submitBtn = document.querySelector('.submit-btn');
            if (submitBtn) {
                submitBtn.disabled = true;
                submitBtn.textContent = '📤 Saving...';
            }

            // Save each selected digit
            const savePromises = [];
            const savedDigits = [];

            for (let position in selectedDigits) {
                const digitValue = selectedDigits[position];
                const imageBase64 = window[`digitImageBase64_${position}`];

                if (imageBase64) {
                    // Generate filename based on original filename and position
                    const baseFilename = currentFilename.replace('.png', '');
                    const filename = `${baseFilename}_pos${parseInt(position) + 1}_digit${digitValue}.png`;

                    const saveData = {
                        digit: digitValue,
                        image_base64: imageBase64,
                        filename: filename
                    };

                    const savePromise = fetch('/save-digit', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(saveData)
                    }).then(response => response.json());

                    savePromises.push(savePromise);
                    savedDigits.push({
                        position: parseInt(position) + 1,
                        digit: digitValue
                    });
                }
            }

            try {
                const results = await Promise.all(savePromises);
                const allSuccess = results.every(r => r.success);

                if (allSuccess) {
                    // Show success message
                    const successDiv = document.createElement('div');
                    successDiv.className = 'success-message';
                    successDiv.innerHTML = `✅ Success! Saved ${savedDigits.length} digit(s):<br>
                                            ${savedDigits.map(d => `Position ${d.position} → Digit ${d.digit}`).join('<br>')}`;

                    const selectorDiv = document.querySelector('.digit-selector');
                    selectorDiv.insertBefore(successDiv, selectorDiv.firstChild);

                    // Clear selected digits
                    selectedDigits = {};

                    // Update button styles
                    currentDigits.forEach((d, index) => {
                        for (let i = 0; i <= 9; i++) {
                            const btn = document.getElementById(`btn-${index}-${i}`);
                            if (btn) {
                                btn.classList.remove('selected');
                            }
                        }
                    });

                    // Remove success message after 5 seconds
                    setTimeout(() => {
                        successDiv.remove();
                    }, 5000);
                } else {
                    throw new Error('Some saves failed');
                }
            } catch (err) {
                console.error('Error saving digits:', err);
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-message';
                errorDiv.innerHTML = `❌ Error saving digits: ${err.message}`;

                const selectorDiv = document.querySelector('.digit-selector');
                selectorDiv.insertBefore(errorDiv, selectorDiv.firstChild);

                setTimeout(() => {
                    errorDiv.remove();
                }, 5000);
            } finally {
                if (submitBtn) {
                    submitBtn.disabled = false;
                    submitBtn.textContent = '📤 Save Selected Digits';
                }
            }
        }

        // Load initial files
        loadFiles();
    </script>
</body>

</html>
