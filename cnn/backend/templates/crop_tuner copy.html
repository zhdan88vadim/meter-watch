<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройка параметров обрезки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .content {
            display: flex;
            gap: 30px;
            padding: 30px;
            flex-wrap: wrap;
        }

        .controls {
            flex: 1;
            min-width: 300px;
        }

        .preview {
            flex: 2;
            min-width: 500px;
        }

        .control-group {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .control-group h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .param-slider {
            margin-bottom: 20px;
        }

        .param-slider label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        .param-slider input {
            width: 100%;
            margin: 10px 0;
        }

        .param-value {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.9em;
            margin-left: 10px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-right: 10px;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .btn-danger {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }

        .btn-warning {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .image-container {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .image-container h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .image-container img {
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .digits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .digit-card {
            background: white;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .digit-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .digit-card img {
            width: 80px;
            height: 80px;
            margin: 10px auto;
        }

        .digit-card .prediction {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .digit-card .confidence {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }

        .result-number {
            font-size: 2.5em;
            font-weight: bold;
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            margin-top: 20px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .info-text {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }

        .current-values {
            background: #e9ecef;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .content {
                flex-direction: column;
            }
            .preview {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 Настройка параметров обрезки</h1>
            <p>Интерактивная настройка области распознавания цифр</p>
        </div>

        <div class="content">
            <div class="controls">
                <div class="control-group">
                    <h3>📷 Источник изображения</h3>
                    <button onclick="fetchFromCamera()" class="btn-primary">📸 Получить с камеры</button>
                    <input type="file" id="imageUpload" accept="image/*" style="display: none;">
                    <button onclick="document.getElementById('imageUpload').click()" class="btn-primary">📁 Загрузить файл</button>
                </div>

                <div class="control-group">
                    <h3>✂️ Параметры обрезки</h3>
                    
                    <div class="param-slider">
                        <label>Обрезка сверху: <span id="cropTopValue" class="param-value">45</span> px</label>
                        <input type="range" id="cropTop" min="0" max="300" value="45" step="5" 
                               oninput="updateCropParam('crop_top', this.value)">
                    </div>

                    <div class="param-slider">
                        <label>Обрезка снизу: <span id="cropBottomValue" class="param-value">35</span> px</label>
                        <input type="range" id="cropBottom" min="0" max="300" value="35" step="5"
                               oninput="updateCropParam('crop_bottom', this.value)">
                    </div>

                    <div class="param-slider">
                        <label>Обрезка слева: <span id="cropLeftValue" class="param-value">8</span> px</label>
                        <input type="range" id="cropLeft" min="0" max="300" value="8" step="5"
                               oninput="updateCropParam('crop_left', this.value)">
                    </div>

                    <div class="param-slider">
                        <label>Обрезка справа: <span id="cropRightValue" class="param-value">0</span> px</label>
                        <input type="range" id="cropRight" min="0" max="300" value="0" step="5"
                               oninput="updateCropParam('crop_right', this.value)">
                    </div>

                    <div class="current-values" id="currentValues">
                        Загрузка текущих значений...
                    </div>
                </div>

                <div class="control-group">
                    <h3>⚙️ Действия</h3>
                    <button onclick="previewCrop()" class="btn-primary">👁️ Предпросмотр</button>
                    <button onclick="saveToConfig()" class="btn-success">💾 Сохранить в конфиг</button>
                    <button onclick="resetToDefault()" class="btn-danger">🔄 Сброс к默认</button>
                </div>

                <div id="info" class="control-group" style="display: none;">
                    <h3>ℹ️ Информация</h3>
                    <div id="infoContent"></div>
                </div>
            </div>

            <div class="preview">
                <div id="loading" class="loading">
                    <div class="spinner"></div>
                    <p>Обработка изображения...</p>
                </div>

                <div id="previewContent" style="display: none;">
                    <div class="image-container">
                        <h3>📸 Обрезанное изображение</h3>
                        <img id="croppedImage" alt="Обрезанное изображение">
                        <div class="info-text" id="sizeInfo"></div>
                    </div>

                    <div class="image-container">
                        <h3>🔍 Пороговое изображение</h3>
                        <img id="thresholdImage" alt="Пороговое изображение">
                    </div>

                    <div class="image-container">
                        <h3>🔢 Распознанные цифры</h3>
                        <div id="digitsGrid" class="digits-grid"></div>
                        <div id="fullNumber" class="result-number"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentImageBase64 = null;
        let currentCropParams = {
            crop_top: 45,
            crop_bottom: 35,
            crop_left: 8,
            crop_right: 0
        };

        const API_BASE = '';

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            loadCurrentConfig();
            
            document.getElementById('imageUpload').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        currentImageBase64 = event.target.result.split(',')[1];
                        previewCrop();
                    };
                    reader.readAsDataURL(file);
                }
            });
        });

        function updateCropParam(param, value) {
            currentCropParams[param] = parseInt(value);
            
            const displayMap = {
                'crop_top': 'cropTopValue',
                'crop_bottom': 'cropBottomValue',
                'crop_left': 'cropLeftValue',
                'crop_right': 'cropRightValue'
            };
            
            if (displayMap[param]) {
                document.getElementById(displayMap[param]).textContent = value;
            }
        }

        async function loadCurrentConfig() {
            try {
                const response = await fetch(`${API_BASE}/config`);
                const data = await response.json();
                if (data.status === 'success') {
                    currentCropParams = {
                        crop_top: data.config.crop_top,
                        crop_bottom: data.config.crop_bottom,
                        crop_left: data.config.crop_left,
                        crop_right: data.config.crop_right
                    };
                    
                    document.getElementById('cropTop').value = currentCropParams.crop_top;
                    document.getElementById('cropBottom').value = currentCropParams.crop_bottom;
                    document.getElementById('cropLeft').value = currentCropParams.crop_left;
                    document.getElementById('cropRight').value = currentCropParams.crop_right;
                    
                    updateCropParam('crop_top', currentCropParams.crop_top);
                    updateCropParam('crop_bottom', currentCropParams.crop_bottom);
                    updateCropParam('crop_left', currentCropParams.crop_left);
                    updateCropParam('crop_right', currentCropParams.crop_right);
                    
                    document.getElementById('currentValues').innerHTML = `
                        <strong>Текущие значения в конфиге:</strong><br>
                        Сверху: ${currentCropParams.crop_top}px | 
                        Снизу: ${currentCropParams.crop_bottom}px | 
                        Слева: ${currentCropParams.crop_left}px | 
                        Справа: ${currentCropParams.crop_right}px
                    `;
                }
            } catch (error) {
                console.error('Error loading config:', error);
                document.getElementById('currentValues').innerHTML = 'Ошибка загрузки конфигурации';
            }
        }

        async function fetchFromCamera() {
            showLoading(true);
            try {
                const payload = {
                    use_camera: true,
                    crop_top: currentCropParams.crop_top,
                    crop_bottom: currentCropParams.crop_bottom,
                    crop_left: currentCropParams.crop_left,
                    crop_right: currentCropParams.crop_right
                };
                
                const response = await fetch(`${API_BASE}/preview_crop`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                if (data.status === 'success') {
                    displayResults(data.result);
                    currentImageBase64 = null;
                } else {
                    showError(data.error || 'Ошибка получения изображения');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('Ошибка получения изображения с камеры');
            } finally {
                showLoading(false);
            }
        }

        async function previewCrop() {
            showLoading(true);
            try {
                const payload = {
                    use_camera: currentImageBase64 === null,
                    crop_top: currentCropParams.crop_top,
                    crop_bottom: currentCropParams.crop_bottom,
                    crop_left: currentCropParams.crop_left,
                    crop_right: currentCropParams.crop_right
                };
                
                if (currentImageBase64) {
                    payload.use_camera = false;
                    payload.image_base64 = currentImageBase64;
                }
                
                const response = await fetch(`${API_BASE}/preview_crop`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                if (data.status === 'success') {
                    displayResults(data.result);
                } else {
                    showError(data.error || 'Ошибка обработки изображения');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('Ошибка обработки изображения');
            } finally {
                showLoading(false);
            }
        }

        // Используем существующий эндпоинт POST /config
        async function saveToConfig() {
            showLoading(true);
            try {
                const payload = {
                    crop_top: currentCropParams.crop_top,
                    crop_bottom: currentCropParams.crop_bottom,
                    crop_left: currentCropParams.crop_left,
                    crop_right: currentCropParams.crop_right
                };
                
                // Отправляем на существующий эндпоинт /config
                const response = await fetch(`${API_BASE}/config`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                if (data.status === 'success') {
                    showInfo('Параметры успешно сохранены в конфиг!');
                    // Обновляем отображение текущих значений
                    await loadCurrentConfig();
                } else {
                    showError(data.message || 'Ошибка сохранения');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('Ошибка сохранения параметров');
            } finally {
                showLoading(false);
            }
        }

        async function resetToDefault() {
            currentCropParams = {
                crop_top: 45,
                crop_bottom: 35,
                crop_left: 8,
                crop_right: 0
            };
            
            document.getElementById('cropTop').value = 45;
            document.getElementById('cropBottom').value = 35;
            document.getElementById('cropLeft').value = 8;
            document.getElementById('cropRight').value = 0;
            
            updateCropParam('crop_top', 45);
            updateCropParam('crop_bottom', 35);
            updateCropParam('crop_left', 8);
            updateCropParam('crop_right', 0);
            
            showInfo('Параметры сброшены к значениям по умолчанию');
            previewCrop();
        }

        function displayResults(result) {
            if (result.cropped_image) {
                document.getElementById('croppedImage').src = `data:image/png;base64,${result.cropped_image}`;
            }
            
            if (result.threshold_image) {
                document.getElementById('thresholdImage').src = `data:image/png;base64,${result.threshold_image}`;
            }
            
            const sizeInfo = document.getElementById('sizeInfo');
            if (result.original_size && result.cropped_size) {
                sizeInfo.innerHTML = `Оригинал: ${result.original_size.width}x${result.original_size.height}px | ` +
                                     `Обрезано: ${result.cropped_size.width}x${result.cropped_size.height}px`;
            }
            
            const digitsGrid = document.getElementById('digitsGrid');
            digitsGrid.innerHTML = '';
            
            if (result.digits && result.digits.length > 0) {
                result.digits.forEach(digit => {
                    const card = document.createElement('div');
                    card.className = 'digit-card';
                    card.innerHTML = `
                        <div class="prediction">${digit.prediction}</div>
                        <img src="data:image/png;base64,${digit.digit_image}" alt="Digit ${digit.position}">
                        <div class="confidence">Уверенность: ${(digit.confidence * 100).toFixed(1)}%</div>
                        <div class="info-text">Позиция: ${digit.position}</div>
                    `;
                    digitsGrid.appendChild(card);
                });
            } else {
                digitsGrid.innerHTML = '<div class="alert alert-error">Цифры не найдены</div>';
            }
            
            document.getElementById('fullNumber').textContent = `Распознанное число: ${result.full_number || '---'}`;
            document.getElementById('previewContent').style.display = 'block';
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            if (show) {
                document.getElementById('previewContent').style.display = 'none';
            }
        }

        function showError(message) {
            const infoDiv = document.getElementById('info');
            const infoContent = document.getElementById('infoContent');
            infoContent.innerHTML = `<div class="alert alert-error">❌ ${message}</div>`;
            infoDiv.style.display = 'block';
            setTimeout(() => {
                infoDiv.style.display = 'none';
            }, 5000);
        }

        function showInfo(message) {
            const infoDiv = document.getElementById('info');
            const infoContent = document.getElementById('infoContent');
            infoContent.innerHTML = `<div class="alert alert-success">✅ ${message}</div>`;
            infoDiv.style.display = 'block';
            setTimeout(() => {
                infoDiv.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
