<div class="digit-display-card">
  <h2 class="card-title">
    <i class="fas fa-gauge-high"></i>
    📊 Показания счётчика
  </h2>

  <div class="meter-display">
    <div class="meter-label">Текущие показания</div>
    <div class="meter-value">
      <div class="digit" *ngFor="let digit of currentDigits; let i = index" [style.animationDelay]="i * 0.05 + 's'">
        {{ digit }}
      </div>
      <div class="placeholder" *ngIf="currentDigits.length === 0">---</div>
    </div>
    <div class="meter-update">
      <i class="fas fa-clock"></i>
      Обновлено: {{ latestReading && latestReading.timestamp * 1000 | date:'dd.MM.yyyy HH:mm:ss' }}
    </div>
  </div>

  <div class="card-content">

    <h3 style="font-size: 14px; color: var(--text-secondary); margin-bottom: 12px;">
      История показаний
    </h3>
    <div class="history-list">
      <div class="history-section" *ngIf="history.length > 0">
        <div class="history-list">
          <div class="history-item" *ngFor="let item of history">
            <span class="history-value">{{ item.digits.join('') }}</span>
            <span class="history-time">{{ item.time }}</span>
          </div>
        </div>
      </div>
    </div>

  </div>

  <hr>

  <app-person-status-card
    [lastSeenTimestamp]="(statusService.status$ | async)?.person?.last_seen ?? null"
    [isPresentNow]="(statusService.status$ | async)?.person?.is_active ?? false"
    [isAlertActive]="(statusService.status$ | async)?.alert?.active ?? false"
    [isStartupMode]="(statusService.status$ | async)?.system?.startup_mode ?? false"
    alertMessage="⚠️ Газ идет! Отправлено в Telegram"
  />

</div>
