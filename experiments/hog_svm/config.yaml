data:
  train_root: "./dataset/test (копия)/"
  val_root: "/mnt/ntfs/learn_ML/test_classes/Тестовое Python ML,CV/Тестовое_ML/тестовое_ml/dataset/validation"
  image_size: 64
  train_split: 0.8
  num_workers: 4
  
model:
  name: "alphabet_recognizer"
  num_classes: 33
  dropout_rate: 0.5
  
training:
  batch_size: 128
  epochs: 20
  learning_rate: 0.0005
  weight_decay: 0.02
  scheduler_patience: 2
  early_stopping_patience: 3
  gradient_clip_norm: 1.0
  
augmentation:
  train:
    enable_blobs: true
    enable_spots: true
    enable_stroke_variation: true
    enable_bleed: true
    enable_missing_part: true
    rotation_degrees: 10
    translate: [0.1, 0.2]
    shear: 15